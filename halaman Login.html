<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Seblak Bakso</title>
    <link rel="stylesheet" href="Navlogin.css">
</head>
<body>

<section class="login">
    <div class="overlay">
        <div class="login-box">
            <h2>Login</h2>
            <p>Selamat datang di <b>Seblak Bakso</b></p>

            <form action="">
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                </div>

                <button type="submit">Masuk</button>

                <p class="register">
                    Belum punya akun?
                    <a href="#">Daftar Sekarang</a>
                    <h4><a href="index.html">Kembali ke Beranda</a></h4>
                </p>
            </form>
        </div>
    </div>
</section>

</body>
</html>
